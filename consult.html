<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consult Now - Sharks of Law</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/style.css">
</head>

<body>

    <div class="consult-container py-5">
        <div class="container">
            <div class="consult-card">
                <!-- Left Panel: Branding & Motivation -->
                <div class="consult-left">
                    <img src="assets/images/logo.png" alt="Sharks of Law" class="mb-4" style="height: 60px;">
                    <div class="price-badge-large">₹199/<span>-</span></div>
                    <h2 class="consult-moto" id="left-panel-text">One Enquiry.<br>The Right Lawyer.</h2>
                    <p class="text-muted" id="left-panel-subtext">Your Legal Concern, Handled by Verified Professionals.
                    </p>
                </div>

                <!-- Right Panel: Multi-Step Form -->
                <div class="consult-right">
                    <div class="consult-right-header">
                        <h3 id="step-title">Get Legal Help Now</h3>
                    </div>

                    <form id="consultForm">
                        <!-- Step 1: Personal Details -->
                        <div class="step-content active" id="step1">
                            <div class="mb-4">
                                <label class="form-label-consult">Full Name</label>
                                <input type="text" class="form-control form-control-consult"
                                    placeholder="Enter Your Full Name" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label-consult">Phone Number</label>
                                <input type="tel" class="form-control form-control-consult"
                                    placeholder="Enter Your Number" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label-consult">Legal Issue</label>
                                <select class="form-select form-control-consult">
                                    <option selected>Divorce & Family Law</option>
                                    <option>Criminal Law</option>
                                    <option>Property Law</option>
                                    <option>Corporate Law</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label-consult">Case Details</label>
                                <textarea class="form-control form-control-consult" rows="4"
                                    placeholder="Briefly describe your case or concern"></textarea>
                            </div>
                            <div class="text-center">
                                <button type="button" class="btn-consult-next" onclick="nextStep(2)">Get Legal Help
                                    Now</button>
                            </div>
                        </div>

                        <!-- Step 2: Date & Slot Selection -->
                        <div class="step-content" id="step2">
                            <div class="mb-4">
                                <label class="form-label-consult">Date</label>
                                <div class="position-relative">
                                    <input type="date" class="form-control form-control-consult" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label-consult">Morning Slot</label>
                                    <div class="slot-grid">
                                        <div class="slot-btn" onclick="selectSlot(this)">08:00 AM</div>
                                        <div class="slot-btn selected" onclick="selectSlot(this)">09:00 AM</div>
                                        <div class="slot-btn" onclick="selectSlot(this)">10:00 AM</div>
                                        <div class="slot-btn" onclick="selectSlot(this)">11:00 AM</div>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="form-label-consult">Evening Slot</label>
                                    <div class="slot-grid">
                                        <div class="slot-btn available" onclick="selectSlot(this)">12:00 PM</div>
                                        <div class="slot-btn" onclick="selectSlot(this)">01:00 PM</div>
                                        <div class="slot-btn available" onclick="selectSlot(this)">02:00 PM</div>
                                        <div class="slot-btn" onclick="selectSlot(this)">03:00 PM</div>
                                    </div>
                                </div>
                            </div>
                            <div class="text-center mt-4">
                                <button type="button" class="btn-consult-next" onclick="nextStep(3)">Continue</button>
                            </div>
                        </div>

                        <!-- Step 3: Payment -->
                        <div class="step-content" id="step3">
                            <div class="payment-method-box">
                                <span>Payment Method</span>
                                <img src="https://img.icons8.com/color/48/000000/mastercard.png" alt="MC" width="30">
                                <img src="https://img.icons8.com/color/48/000000/visa.png" alt="Visa" width="30">
                                <img src="https://img.icons8.com/color/48/000000/amex.png" alt="Amex" width="30">
                            </div>

                            <div class="mb-4">
                                <label class="form-label-consult">Name on card</label>
                                <input type="text" class="form-control form-control-consult" placeholder="Meet Patel">
                            </div>

                            <div class="mb-4">
                                <label class="form-label-consult">Card number</label>
                                <input type="text" class="form-control form-control-consult"
                                    placeholder="0000 0000 0000 0000">
                            </div>

                            <div class="row">
                                <div class="col-6 mb-4">
                                    <label class="form-label-consult">Card expiration</label>
                                    <div class="d-flex gap-2">
                                        <select class="form-select form-control-consult">
                                            <option>Month</option>
                                        </select>
                                        <select class="form-select form-control-consult">
                                            <option>Year</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-6 mb-4">
                                    <label class="form-label-consult">Card Security Code</label>
                                    <div class="position-relative">
                                        <input type="text" class="form-control form-control-consult" placeholder="Code">
                                        <i class="far fa-question-circle position-absolute"
                                            style="right: 15px; top: 15px; color: #ccc;"></i>
                                    </div>
                                </div>
                            </div>

                            <div class="text-center mt-4">
                                <button type="button" class="btn-consult-next"
                                    onclick="simulatePhonePe()">Continue</button>
                            </div>
                        </div>

                        <!-- Step 4: Success -->
                        <div class="step-content" id="step4">
                            <div class="text-center">
                                <div class="success-icon">
                                    <i class="fas fa-check"></i>
                                </div>
                                <h1 class="display-4 fw-bold text-navy mb-3">Thank You!</h1>
                                <p class="h4 text-muted mb-5">Your Booking Successfully</p>
                                <a href="https://wa.me/919876543210" class="wa-btn">
                                    Get Link on WhatsApp <i class="fab fa-whatsapp"></i>
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        function nextStep(step) {
            $('.step-content').removeClass('active');
            $('#step' + step).addClass('active');

            if (step === 2) {
                $('#step-title').text('Book Your Expert Consultation');
                $('#left-panel-text').html('Justice Begins With The<br>Courage To Speak.');
                $('#left-panel-subtext').text('');
            } else if (step === 3) {
                $('#step-title').text('Secure Payment for Consultation');
                $('#left-panel-text').html('You Don’t Have To<br>Face This Alone.');
            } else if (step === 4) {
                $('.consult-right-header').hide();
                $('.consult-left').hide();
                $('.consult-right').css('width', '100%');
            }
        }

        function selectSlot(el) {
            $('.slot-btn').removeClass('selected');
            $(el).addClass('selected');
        }

        function simulatePhonePe() {
            // In a real scenario, this would redirect to PhonePe or open their intent URL
            // For now, we simulate the redirect/process and show the success screen
            const btn = event.target;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Processing...';
            btn.disabled = true;

            setTimeout(() => {
                nextStep(4);
            }, 2000);
        }
    </script>
</body>

</html>
